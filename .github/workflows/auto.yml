name: Scanzaclip Autonomous Engine

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run Engine Once
        run: python -c "from engine.core import execute; print(execute())"
git commit --allow-empty -m "Trigger workflow"
git push origin main
